linkrobins-font-sizer:

  # ===================================================================
  # Forum UI
  #
  # All strings users see in the header button and the size modal.
  # ===================================================================
  forum:

    # Header button (visible in the forum header secondary controls)
    header_button:
      label: "Font Size"
      title: "Font Size"

    # Modal
    modal:
      title: "Text & UI Size"
      close_button_label: "Close"

      # "Reading Text" section
      reading_text_heading: "Reading Text"
      reading_text_hint: "Affects post body and discussion titles."
      reading_text_value: "{percent}%"

      # "Interface Size" section
      interface_size_heading: "Interface Size"
      interface_size_hint: "Affects navigation, buttons, and other UI elements."
      ui_default: "Default"
      ui_large: "Large"

      # Reset link at the bottom
      reset_button: "Reset to site default"

  # ===================================================================
  # Admin UI
  #
  # Strings on the extension settings page.
  # ===================================================================
  admin:

    settings:
      # "Default Reading Text Size" group
      text_size_label: "Default Reading Text Size"
      text_size_help: "Sets the sitewide default for post body and title text. Users can override this with the Font Size button in the header."
      text_size_value: "{percent}%"
      reset_button: "Reset to 100%"

      # "Default Interface Size" group
      ui_size_label: "Default Interface Size"
      ui_size_help: "Sets the sitewide default for navigation, buttons, and UI elements. Users can override this with the Font Size button in the header."
      ui_default: "Default"
      ui_large: "Large"
